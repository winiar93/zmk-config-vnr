CONFIG_ZMK_KEYBOARD_NAME="VNR CORNE"

CONFIG_ZMK_MOUSE=y

# Set deep sleep
CONFIG_ZMK_SLEEP=y

# Go sleep after 15min
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=2100000

# Debounce is protection against "contact chatter" of mechanical switches.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=0

# Increasing the transmit power of the BLE transmitter
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery monitoring for both keyboard halves.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y